name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: # Allows manual invocation

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        directory:
          [
            'auth',
            'export',
            'import',
            'export-and-sign',
            'oauth-origin',
            'oauth-redirect',
            'shared',
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # https://github.com/actions/setup-node
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      # Some frames (like import/export-and-sign) depend on code in ./shared.
      # Ensure shared's dependencies (including bech32) are installed before running their tests.
      - name: Install Dependencies for shared (for dependent frames)
        if: ${{ matrix.directory == 'import' || matrix.directory == 'export-and-sign' }}
        working-directory: ./shared
        run: npm install

      - name: Install Dependencies for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm install

      - name: Check Provenance Attestations for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm audit signatures

      - name: Run Tests for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm test

  format:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          [
            'auth',
            'export',
            'import',
            'export-and-sign',
            'oauth-origin',
            'oauth-redirect',
            'shared',
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # https://github.com/actions/setup-node
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install Dependencies for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm install

      - name: Run Prettier Check for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm run prettier:check

  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          [
            'auth',
            'export',
            'import',
            'export-and-sign',
            'oauth-origin',
            'oauth-redirect',
            'shared',
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # https://github.com/actions/setup-node
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install Dependencies for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm install

      - name: Run ESLint for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm run lint

  build-check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        directory:
          [
            'import',
            'export-and-sign',
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # https://github.com/actions/setup-node
      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install Dependencies for shared
        working-directory: ./shared
        run: npm install

      - name: Install Dependencies for ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm install

      - name: Build ${{ matrix.directory }}
        working-directory: ./${{ matrix.directory }}
        run: npm run build

      - name: Check dist folder matches committed version
        uses: ./.github/actions/build-check
