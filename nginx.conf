# Taken from the default nginx config in our base image
# See "Customize configuration" on https://hub.docker.com/_/nginx
pid /tmp/nginx.pid;
worker_processes  auto;
events {
    worker_connections 1024;
}

# Send anything from info to errors to stdout for logging
error_log /dev/stdout info;

# Run in the foreground
daemon off;

http {
    # Taken from the default nginx config in our base image
    # See "Customize configuration" on https://hub.docker.com/_/nginx
    proxy_temp_path /tmp/proxy_temp;
    client_body_temp_path /tmp/client_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    sendfile on;
    keepalive_timeout 65;
    gzip on;

    # Send access logs to stdout for logging
    access_log /dev/stdout main;

    include /etc/nginx/nginx.upstreams.*.conf;

    # iframe
    server {
        listen 8080;
        root /usr/share/nginx/auth;

        # Health endpoint for k8s
        location = /health {
            access_log off;
            add_header 'Content-Type' 'application/json';
            return 200 '{"status":"UP"}';
        }
    }
    server {
        listen 8081;
        root /usr/share/nginx/export;
        location / {
            ssi on;
            set $ssi_turnkey_signer_environment "${TURNKEY_SIGNER_ENVIRONMENT}";
            try_files $uri $uri/ $uri/index.html =404;
        }

        set $devserver_upstream "http://export";
        include /etc/nginx/nginx.devserver.*.conf;
    }
    server {
        listen 8082;
        root /usr/share/nginx/recovery;
    }
    server {
        listen 8083;
        root /usr/share/nginx/import;
        ssi on;
        set $ssi_turnkey_signer_environment "${TURNKEY_SIGNER_ENVIRONMENT}";
        location / {
            try_files $uri $uri/ /index.html /standalone.html =404;
        }

        set $devserver_upstream "http://import";
        include /etc/nginx/nginx.devserver.*.conf;
    }
    server {
        listen 8086;
        root /usr/share/nginx/export-and-sign;
        ssi on;
        set $ssi_turnkey_signer_environment "${TURNKEY_SIGNER_ENVIRONMENT}";
        # optional: add CSP-related configs here later
        location / {
            try_files $uri $uri/ /index.html =404;
        }

        set $devserver_upstream "http://export-and-sign";
        include /etc/nginx/nginx.devserver.*.conf;
    }

    # oauth
    server {
        listen 8084;
        root /usr/share/nginx/oauth-origin;
    }
    server {
        listen 8085;
        root /usr/share/nginx/oauth-redirect;
    }
}
